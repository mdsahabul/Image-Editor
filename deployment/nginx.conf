#
# Place this file at /etc/nginx/sites-available/image-editor
# then: sudo ln -s /etc/nginx/sites-available/image-editor /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL (managed by Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Security headers ──────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin" always;

    # ── Laravel API ───────────────────────────────────────────────────
    root /var/www/image-editor/backend/public;
    index index.php;

    client_max_body_size 30M;

    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /storage {
        alias /var/www/image-editor/backend/storage/app/public;
        expires 7d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    # ── React SPA (served from backend/public/app) ────────────────────
    location / {
        root /var/www/image-editor/backend/public/app;
        try_files $uri $uri/ /index.html;
        expires 1h;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root /var/www/image-editor/backend/public/app;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ── AI service (internal only — not exposed to the internet) ──────
    # Proxied by Laravel; never expose port 8001 externally.
}
